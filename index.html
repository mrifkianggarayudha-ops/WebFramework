<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>TechMatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Logo -->
  <div class="logo">🎮</div>

  <!-- Judul -->
  <h1 class="title">TechMatch</h1>
  <p class="subtitle">
    Asah pengetahuanmu tentang perangkat komputer dengan cara yang menyenangkan!
  </p>

  <!-- Pilihan Game -->
  <div class="menu">
    <div class="card active" data-game="hardware">
      🖥️
      <span>Hardware</span>
    </div>

    <div class="card" data-game="fungsi">
      ⚙️
      <span>Fungsi</span>
    </div>
  </div>

  <!-- Tombol -->
  <div class="buttons">
    <button class="btn primary">Mulai Game</button>
    <button class="btn secondary">Petunjuk</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
